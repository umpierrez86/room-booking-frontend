name: deploy

# CD a Railway. Solo se dispara cuando CI terminó correctamente sobre main.
# Requiere RAILWAY_TOKEN (secret), RAILWAY_SERVICE y PRODUCTION_URL (variables
# del repositorio). VITE_API_URL se configura como variable del servicio Railway.
on:
  workflow_run:
    workflows: ["ci"]
    types: [completed]
    branches: [main]

concurrency:
  group: deploy-frontend
  cancel-in-progress: false

jobs:
  deploy:
    if: ${{ github.event.workflow_run.conclusion == 'success' }}
    runs-on: ubuntu-latest
    environment: production
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.workflow_run.head_sha }}
      - name: Install Railway CLI
        run: npm i -g @railway/cli
      - name: Deploy to Railway
        env:
          RAILWAY_TOKEN: ${{ secrets.RAILWAY_TOKEN }}
          RAILWAY_SERVICE: ${{ vars.RAILWAY_SERVICE }}
        run: railway up --service "$RAILWAY_SERVICE" --detach

  smoke:
    needs: deploy
    runs-on: ubuntu-latest
    steps:
      - name: Verify production serves the SPA
        env:
          PRODUCTION_URL: ${{ vars.PRODUCTION_URL }}
        run: |
          for i in $(seq 1 12); do
            if curl -fsS "$PRODUCTION_URL/" | grep -qi '<div id="root"'; then
              echo "production serves the SPA"; exit 0
            fi
            echo "waiting for production... ($i)"; sleep 5
          done
          echo "production did not serve the SPA"; exit 1
