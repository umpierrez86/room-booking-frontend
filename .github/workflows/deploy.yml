name: deploy

# CD blue-green a Railway para el frontend estático (nginx). Se dispara SOLO si "ci" terminó verde en main.
# Requiere:
#   - Secret RAILWAY_TOKEN.
#   - Secret/var GREEN_URL con la URL pública del servicio "frontend-green".
#   - Un GitHub Environment "production" con required reviewers → gate manual de promoción.
# Recordá: VITE_API_URL es build-time; se setea como build arg/variable del servicio frontend-green en Railway.
on:
  workflow_run:
    workflows: ["ci"]
    types: [completed]
    branches: [main]

concurrency:
  group: deploy-frontend
  cancel-in-progress: false

jobs:
  deploy-green:
    if: ${{ github.event.workflow_run.conclusion == 'success' }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.workflow_run.head_sha }}
      - name: Install Railway CLI
        run: npm i -g @railway/cli
      - name: Deploy a frontend-green
        env:
          RAILWAY_TOKEN: ${{ secrets.RAILWAY_TOKEN }}
        run: railway up --service frontend-green --detach

  smoke:
    needs: deploy-green
    runs-on: ubuntu-latest
    steps:
      - name: Verificar que GREEN sirve la SPA
        env:
          GREEN_URL: ${{ secrets.GREEN_URL }}
        run: |
          for i in $(seq 1 12); do
            if curl -fsS "$GREEN_URL/" | grep -qi '<div id="root"'; then
              echo "green sirviendo la SPA"; exit 0
            fi
            echo "esperando a green... ($i)"; sleep 5
          done
          echo "GREEN no sirvió la SPA — se aborta el cutover"; exit 1

  promote:
    needs: smoke
    runs-on: ubuntu-latest
    environment: production
    steps:
      - name: Install Railway CLI
        run: npm i -g @railway/cli
      - name: Cutover blue -> green
        env:
          RAILWAY_TOKEN: ${{ secrets.RAILWAY_TOKEN }}
        run: |
          # Reasignar el dominio público de "frontend-blue" a "frontend-green".
          # NOTA: el swap de dominio depende de la API/CLI de Railway vigente (ver comentario del backend).
          # Dejar BLUE vivo como rollback y luego decomisionar.
          echo "Ejecutar swap de dominio frontend-blue -> frontend-green (ver comentario)."
